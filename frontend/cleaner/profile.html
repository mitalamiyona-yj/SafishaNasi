<!-- frontend/cleaner/profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaner Profile - Safi Shanasi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Copy navigation styles from dashboard.html */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        .navbar { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 1rem 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #27ae60, #2c3e50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .cleaner-badge { background: linear-gradient(135deg, #27ae60, #2c3e50); color: white; font-size: 0.8rem; padding: 0.2rem 0.8rem; border-radius: 50px; margin-left: 0.5rem; }
        .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
        .mobile-menu-btn span { display: block; width: 25px; height: 3px; background: #2c3e50; margin: 5px 0; }
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-menu a { text-decoration: none; color: #2c3e50; padding: 0.5rem 1rem; border-radius: 8px; display: flex; align-items: center; gap: 0.5rem; }
        .nav-menu a:hover, .nav-menu a.active { background: linear-gradient(135deg, #27ae60, #2c3e50); color: white; }
        .logout-btn { background: #e74c3c !important; color: white !important; }
        
        .container { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
        .profile-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .profile-header { text-align: center; margin-bottom: 2rem; }
        .profile-avatar { width: 100px; height: 100px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 3rem; color: white; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input { width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 1rem; border-radius: 8px; width: 100%; font-size: 1rem; font-weight: 600; cursor: pointer; }
        
        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; flex-direction: column; padding: 1rem; }
            .nav-menu.active { display: flex; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <i class="fas fa-broom"></i> Safi Shanasi
                <span class="cleaner-badge">Cleaner</span>
            </a>
            <button class="mobile-menu-btn" id="menuToggle"><span></span><span></span><span></span></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="jobs.html"><i class="fas fa-briefcase"></i> Available Jobs</a></li>
                <li><a href="my-jobs.html"><i class="fas fa-calendar-check"></i> My Jobs</a></li>
                <li><a href="earnings.html"><i class="fas fa-dollar-sign"></i> Earnings</a></li>
                <li><a href="profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a></li>
                <li><a href="#" id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h2 id="profileName">Mary Cleaner</h2>
                <p><i class="fas fa-star" style="color: #f1c40f;"></i> 4.8 (23 reviews)</p>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" value="Mary Cleaner">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" value="mary@example.com" readonly>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input type="tel" id="phone" value="+255 123 456 789">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-briefcase"></i> Years of Experience</label>
                    <input type="number" id="experience" value="5">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Specialization</label>
                    <input type="text" id="specialization" value="Home and Office Cleaning">
                </div>
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('navMenu').classList.toggle('active');
        });

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.fullName) {
            document.getElementById('profileName').textContent = user.fullName;
            document.getElementById('fullName').value = user.fullName;
            document.getElementById('email').value = user.email;
        }

        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Profile updated successfully!');
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../login.html';
        });
    </script>
</body>
</html>
